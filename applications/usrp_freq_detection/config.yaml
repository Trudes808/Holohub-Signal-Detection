---
# Number of PSDs to produce before exiting
# -1: run indefinitely
num_psds: -1

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 0  # Master CPU core
    debug: false
    log_level: "info"

    memory_regions:
      # Memory pool for channel 1 frame headers
      - name: "Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 51200
        # Size of the Ethernet header + IP header + UDP header
        buf_size: 42
      # Memory pool for channel 1 CHDR signal data packets
      - name: "CH1_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 51200
        # Size of the CHDR signal data packet
        buf_size: 8192
      # Memory pool for channel 1 CHDR packet headers
      - name: "CH1_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 51200
        # Size of the CHDR header
        buf_size: 8
      # Memory pool for channel 2 CHDR signal data packets
      - name: "CH2_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 51200
        # Size of the CHDR signal data packet
        buf_size: 8192
      # Memory pool for channel 2 CHDR packet headers
      - name: "CH2_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 51200
        # Size of the CHDR header
        buf_size: 8

    interfaces:
      - name: sdr_data
        # Set to the PCIe address of your ingest NIC.
        #  - See list with: sudo lshw -c network -businfo
        address: 0000:41:00.0
        rx:
          flow_isolation: true
          queues:
            - name: "Channel 1 data"
              id: 0
              cpu_core: 5
              # How many data packets do you want before
              # invoking the VRT connector operator?
              # 20 data packets is 20480 samples and
              # we want 625 of them, so 12,500
              batch_size: 12500
              memory_regions:
                - "Headers_RX_CPU"
                - "CH1_CHDR_Headers_RX_CPU"
                - "CH1_Data_RX_GPU"
            - name: "Channel 2 data"
              id: 1
              cpu_core: 6
              # How many data packets do you want before
              # invoking the VRT connector operator?
              # 20 data packets is 20480 samples and
              # we want 625 of them, so 12,500
              batch_size: 12500
              memory_regions:
                - "Headers_RX_CPU"
                - "CH2_CHDR_Headers_RX_CPU"
                - "CH2_Data_RX_GPU"

          flows:
            - name: "Channel 1 data packets"
              id: 0
              action:
                type: queue
                id: 0
              match:
                # Match with the port your SDR is sending to and the
                # length of the signal data packets
                udp_dst: 1234
                ipv4_len: 4148
            - name: "Channel 2 data packets"
              id: 1
              action:
                type: queue
                id: 1
              match:
                # Match with the port your SDR is sending to and the
                # length of the signal data packets
                udp_dst: 1235
                ipv4_len: 4148


chdr_converter:
  interface_name: sdr_data
  num_complex_samples_per_packet: 2048
  num_packets_per_fft: 10
  num_ffts_per_batch: 625
  num_simul_batches: 2
  num_channels: 2

fft:
  burst_size: 20480
  num_bursts: 625
  num_channels: 4
  spectrum_type: 1
  averaging_type: 1
  window_time: 0
  window_type: 0
  transform_points: 20480
  window_points: 20480
  resolution: 6250
  span: 128000000
  weighting_factor: 0
  f1_index: -10240
  f2_index: 10239
  window_time_delta: 0


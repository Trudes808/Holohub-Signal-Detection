# Baseline (non-ML) detector configuration for the offline mask evaluation.
#
# Consumed by run_baseline_offline.py. These detectors do NOT run the C++/CUDA
# pipeline; they read the ground truth + spectrograms produced by an existing
# `run_offline_cuda_detector_eval` batch run (see README.md) and emit masks on the
# identical FFT grid, so `eval_detector_masks.py` + the notebook compare them
# directly against coherent_power / cuda_dino.
#
# Each key under `detectors:` is a detector_type; its value is the parameter block
# passed straight to that detector (see baseline_detectors.py for the fields).

baseline_eval:
  # Existing batch-eval root laid out <root>/<detector>/<file_stem>/ that carries
  # the ground truth (and, ideally, saved spectrogram tensors). Override on the CLI
  # with --source-batch-root. Relative paths are resolved from the working dir.
  source_batch_root: ../batch_runs/CHANGE_ME

  # Where baseline detector directories are written. Default (null) = write them as
  # siblings inside source_batch_root, so one eval_detector_masks.py run scores the
  # baselines next to the trained detectors.
  out_batch_root: null

  # Detector to read GT / spectrogram tensors from (null = first one found).
  source_detector: null

  detectors:

    # --- Pure moving-average power detector ------------------------------------
    # For each time row, slide a moving average along frequency and flag bins that
    # rise threshold_db above that local average (ON above / OFF below).
    3dB_power:
      window_bins: 129        # sliding-average length along frequency (odd; ~local noise floor)
      threshold_db: 3.0       # trigger this many dB above the moving average
      axis: freq              # 'freq' = per-time-row baseline (default); 'time' = per-freq-column
      min_run_bins: 4         # drop ON runs shorter than this along the averaging axis (speckle guard)

    # --- Classic image-processing blob detection -------------------------------
    # Estimate a smooth background, threshold the residual, morphological
    # open/close, connected-component label, keep blobs above a minimum area.
    blob_detection:
      background_mode: per_freq_median  # 'per_freq_median' | 'uniform' | 'global'
      background_window: 257            # window for the 'uniform' background estimate
      threshold_k: 3.5                  # threshold = background + k * robust_std(residual)
      threshold_db: null                # if set, absolute dB-over-background threshold (overrides k)
      open_size: 2                      # morphological opening radius (px) — despeckle
      close_size: 3                     # morphological closing radius (px) — bridge gaps
      min_blob_area: 64                 # discard connected components smaller than this (px)
      fill_bboxes: false                # true = fill each kept blob's bounding box (region mask)

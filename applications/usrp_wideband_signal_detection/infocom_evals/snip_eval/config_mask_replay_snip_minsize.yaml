---
num_runs: -1

pipeline:
  enable_signal_snipper: true
  enable_spectrogram: true
  enable_detector: true
  detector_type: "mask_replay"
  log_from_spectrogram: false

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 9
    debug: false
    log_level: "info"

    memory_regions:
      - name: "Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 42
      - name: "CH1_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 64
      - name: "CH1_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 4096

    interfaces:
      - name: sdr_data
        address: 0000:a2:00.0
        rx:
          flow_isolation: true
          queues:
            - name: "Channel 1 data"
              id: 0
              cpu_core: 10
              batch_size: 1024
              memory_regions:
                - "Headers_RX_CPU"
                - "CH1_CHDR_Headers_RX_CPU"
                - "CH1_Data_RX_GPU"

          flows:
            - name: "Channel 1 data packets"
              id: 0
              action:
                type: queue
                id: 0
              match:
                udp_src: 49153
                udp_dst: 1234

chdr_converter:
  interface_name: sdr_data
  channel_center_frequencies_hz: "2400e6"
  channel_sample_rates_hz: "500e6"
  num_complex_samples_per_packet: 1024
  num_packets_per_fft: 20
  num_ffts_per_batch: 512
  num_simul_batches: 4
  num_channels: 1
  log_packets: false
  log_data: false
  partial_batch_drop_timeout_ms: 250
  degraded_reset_on_rx_queue_warning: false
  degraded_shutdown_on_rx_queue_warning_threshold: 0
  degraded_shutdown_force_exit_timeout_ms: 2000
  degraded_reset_partial_flush_threshold: 0
  degraded_reset_cooldown_ms: 1000

fft:
  burst_size: 20480
  num_bursts: 512
  num_channels: 1
  spectrum_type: 1
  averaging_type: 1
  window_time: 0
  window_type: 0
  reference_span_hz: 500000000
  reference_fft_size: 20480
  override_fft_bin_size: 0
  # FFT length in bins. For this path it should stay aligned with burst_size.
  transform_points: 20480
  # Window size in bins. Keep this equal to transform_points unless you intentionally window a smaller FFT.
  window_points: 20480
  # Fallback bin width in Hz. Keep this equal to round(span / transform_points).
  resolution: 24414
  # Analyzed bandwidth in Hz. When upstream metadata does not provide sample_rate_hz,
  # this must match the radio sender rate, e.g. rx_to_remote_udp.py --rate 500e6.
  span: 500000000
  weighting_factor: 0
  f1_index: -10240
  f2_index: 10239
  window_time_delta: 0

logger:
  num_channels: 1
  log_interval: 5

visualization:
  enable: true
  renderer:
    num_channels: 1
    history_frames: 1
    output_height: 720
    output_width: 1920
    display_time_rows: 2048
    display_freq_bins: 20480
    history_memory_budget_mb: 1024
    rows_per_frame: 2
    mask_frame_offset: 0
    allow_backpressure_valve: true
    refresh_hz: 60
    render_every_n_frames: 1
    timing_summary_enable: false
    timing_summary_every_n: 128
    channel_filter: 0
    tensor_name: "spectrogram"
    demo_title: "Enabling RF AI for Ultra Wideband Real Time Applications"
    demo_subtitle: "Holoscan enables GPU native real time signal processing and computer vision models to detect and extract regions of interest \n \t\t\t\t\t\t from a 500 MSps stream, reducing RF AI workloads to only the regions that matter."
    blue_limit: 0.15
    red_limit: 0.88
    overlay_alpha: 0.7 #0.38
    # Display-only center frequency readout; keep in sync with the sender --freq (2400 MHz here).
    center_frequency_hz: 2400000000.0
    fft_size: 20480
    dino_chunk_rows: 256
    dino_chunk_cols: 512
    db_floor: -20.0
    db_ceil: 15.0
    row_average_n: 1
  holoviz:
    width: 1920
    height: 720
    window_title: "USRP Wideband Spectrogram"
    fullscreen: false

spectrogram:
  num_channels: 1
  enable_save: false
  enable_tensor_save: false
  save_every_n_frames: 100
  max_images_per_channel: 0
  output_height: 256
  output_width: 512
  output_dir: "/workspace/spectrograms"

cuda_dino_detector:
  num_channels: 1
  input_height: 1024
  input_width: 1024
  patch_size: 16
  emit_stride: 1
  channel_filter: -1
  debug_mode: false
  enable_debug_artifact_host_copy: false
  debug_chunk_index: 0
  backend_mode: "cuda_partial"
  inference_backend: "torchscript"
  model_script_path: "/workspace/models/dinov3/weights/dinov3_vitb16_pretrain_lvd1689m-73cec8be.ts"
  torchscript_init_mode: "load_cuda_eval"
  torch_dtype: "fp32"
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std: [0.229, 0.224, 0.225]
  execution_strategy: "reference_chunks"
  max_tokens_per_inference: 8192
  chunk_bandwidth_hz: 231744000.0
  chunk_overlap_hz: 0.0
  uncalibrated_chunk_fraction: 0.40
  uncalibrated_overlap_fraction: 0.20
  ignore_sideband_hz: 7000000.0
  frontend_correction_enable: true
  frontend_correction_row_q: 25.0
  frontend_correction_smooth_sigma: 12.0
  frontend_correction_reference_q: 75.0
  frontend_correction_max_boost_db: 12.0
  frontend_correction_soft_knee_db: 4.0
  frontend_correction_edge_taper_fraction: 0.10
  frontend_correction_edge_taper_sigma: 6.0
  frontend_correction_edge_target_drop_db: 2.5
  dino_coherence_gate_floor: 0.0
  dino_coherence_gate_span_db: 3.0
  # Coherence-rescue floor (monotonic OR). When enabled, large + confident
  # coherence regions are unioned into the final mask so a weak DINO/residual
  # response cannot suppress a strong wideband coherence detection. Disabled
  # by default => byte-identical to prior behavior (narrowband unaffected).
  # ---- Fusion v2 (coherence-primary + DINO structure gate, optional scout) ----
  # "legacy" reproduces the product+residual-veto path exactly. "coherence_primary"
  # builds the final mask as: coherence-band union DINO-structure [union legacy].
  hybrid_fusion_mode: "coherence_primary"
  coherence_band_threshold: 0.05          # absolute threshold on the raw coherence gate (~0.1 scale)
  coherence_band_threshold_quantile: -1.0 # >=0 => per-chunk max(absolute, quantile)
  coherence_band_open_time_px: 5          # 1xk time-continuity opening (kills noise speckle)
  coherence_band_close_freq_px: 0
  coherence_band_close_time_px: 0
  coherence_band_min_area_px: 256
  dino_structure_threshold_quantile: 0.90 # per-chunk quantile on patch scores
  dino_structure_open_len: 3              # >=N patches in a row (time OR freq)
  coherence_primary_include_legacy_mask: true
  coherence_primary_legacy_score: "max"   # veto stack runs on max(coh, dino); "product" = verbatim legacy sub-mask
  dino_contribution_strength: 0.50        # scale normalized DINO before the combine: max(qnorm_coh, 0.70*qnorm_dino)
  raw_dino_positional_deweight: 0.75
  # Empirical per-position (RoPE) noise calibration. Enable the prenorm dumps only for
  # calibration runs (see config_cuda_dino_calibration_dump_single_channel.yaml); set the
  # template path (empty = disabled) after building the template with calibrate_dino_positional_template.py.
  save_raw_dino_patch_prenorm: false
  save_raw_dino_patch_features: false
  raw_dino_positional_template_path: "/workspace/holohub/applications/usrp_wideband_signal_detection/calibration/dino_vitb16_noise_sigma_64x64.npy"     # e.g. /workspace/holohub/applications/usrp_wideband_signal_detection/calibration/dino_vitb16_noise_sigma_64x64.npy
  raw_dino_positional_template_strength: 1.0
  power_q: 0.90
  hybrid_torch_dtype: "fp16"
  enable_mask_post_processing: true
  hybrid_component_min_size: 60
  grouping_bridge_freq_px: 33
  grouping_bridge_time_px: 5
  grouping_min_component_size: 60
  grouping_min_freq_span_px: 5
  grouping_min_time_span_px: 12
  grouping_min_density: 0.06
  filter_detection_mask: true
  grouping_time_continuity_ratio: 0.85
  timing_summary_enable: false
  timing_summary_every_n: 64
  timing_summary_window: 8

coherent_power_signal_detector:
  num_channels: 1
  input_height: 250 #256
  input_width: 20480 #512
  # Full-rate aggressive profile matching the active two-channel fast path,
  # restricted to channel 0 only.
  fast_power_floor_db: 0.5
  fast_power_span_db: 3.0
  fast_score_threshold: 0.4
  live_emit_mask_rows: 16
  live_emit_mask_cols: 20480
  live_emit_freq_persistence_window: 45
  live_emit_freq_persistence_min_hits: 11
  emit_stride: 1
  log_detections: true
  save_performance_path_artifacts: false
  enable_mask_save: false
  save_every_n_frames: 100
  max_masks_per_channel: 0
  output_dir: "/workspace/coherent_power_masks"
  ignore_sideband_percent: 0.0
  ignore_sideband_hz: 7000000.0
  frontend_row_q: 25.0
  frontend_reference_q: 75.0
  frontend_smooth_sigma: 12.0
  frontend_max_boost_db: 0.0
  frontend_signal_cap_db: 0.0
  min_component_size: 1
  filter_detection_mask: true
  grouping_bridge_freq_px: 33
  grouping_bridge_time_px: 5
  grouping_min_component_size: 1
  grouping_min_freq_span_px: 1
  grouping_min_time_span_px: 1
  grouping_min_density: 0.0
  grouping_time_continuity_ratio: 0.85
  timing_summary_enable: true
  timing_summary_every_n: 512
  timing_summary_window: 512


# ================================================================================
# mask_replay detector: replays precomputed masks from mask_dir into the graph so the
# signal_snipper (below) can snip ANY detector's masks. Point mask_dir at a container path
# like /workspace/spectrograms/<batch>/<detector>/<stem>/mask_arrays (repack .packed.npz -> .npy first).
# ================================================================================
mask_replay_detector:
  mask_dir: "/workspace/holohub/PLACEHOLDER_mask_arrays"
  channel: 0
  num_channels: 1
  emit_stride: 1

# --- signal_snipper + sigmf_file_sink params are defined in the "signal_snipper:" block further
#     below. DO NOT add a bare `signal_snipper: true` here: a duplicate top-level key shadows the
#     params map, so from_config("signal_snipper") loses mode/enable_downsample and the operator
#     silently falls back to time_only (full-rate, no decimation). Enable flag = pipeline.enable_signal_snipper.

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 9
    debug: false
    log_level: "info"

    memory_regions:
      - name: "Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 42
      - name: "CH1_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 64
      - name: "CH1_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 4096

    interfaces:
      - name: sdr_data
        address: 0000:a2:00.0
        rx:
          flow_isolation: true
          queues:
            - name: "Channel 1 data"
              id: 0
              cpu_core: 10
              batch_size: 1024
              memory_regions:
                - "Headers_RX_CPU"
                - "CH1_CHDR_Headers_RX_CPU"
                - "CH1_Data_RX_GPU"

          flows:
            - name: "Channel 1 data packets"
              id: 0
              action:
                type: queue
                id: 0
              match:
                udp_src: 49153
                udp_dst: 1234

chdr_converter:
  interface_name: sdr_data
  num_complex_samples_per_packet: 1024
  num_packets_per_fft: 20
  num_ffts_per_batch: 512
  num_simul_batches: 4
  num_channels: 1
  # Single source of truth for the delivered stream. Setting these makes the whole pipeline derive
  # from the TRUE radio rate/center instead of the nominal fft.span: the FFT auto-sizes its bin
  # count/resolution, and the CHDR converter stamps rx_sample_rate_hz / rx_center_frequency_hz into
  # metadata so the snipper (and any downstream) pick them up automatically. The X410 delivers
  # 245.76 Msps even when the sender requests 500e6 -- set the actual delivered rate here.
  channel_sample_rates_hz: "245.76e6"
  channel_center_frequencies_hz: "2400e6"
  log_packets: false
  log_data: false
  partial_batch_drop_timeout_ms: 250
  degraded_reset_on_rx_queue_warning: false
  degraded_shutdown_on_rx_queue_warning_threshold: 3
  degraded_shutdown_force_exit_timeout_ms: 2000
  degraded_reset_partial_flush_threshold: 3
  degraded_reset_cooldown_ms: 1000

fft:
  burst_size: 20480
  num_bursts: 512
  num_channels: 1
  spectrum_type: 1
  averaging_type: 1
  window_time: 0
  window_type: 0
  reference_span_hz: 500000000
  reference_fft_size: 20480
  override_fft_bin_size: 0
  transform_points: 20480
  window_points: 20480
  resolution: 24414
  span: 500000000
  weighting_factor: 0
  f1_index: -10240
  f2_index: 10239
  window_time_delta: 0

logger:
  num_channels: 1
  log_interval: 5

visualization:
  # Off for the snip-focused capture profile: on the RTX 4000 Ada the visualizer + FFT + detector +
  # snipper together cannot sustain 245 MSps. Set true to see the live spectrum (expect reduced
  # throughput / dropped packets on a modest GPU). The snipper/sink do not depend on it.
  enable: false
  renderer:
    num_channels: 1
    history_frames: 1
    output_height: 720
    output_width: 1920
    display_time_rows: 2048
    display_freq_bins: 20480
    history_memory_budget_mb: 1024
    rows_per_frame: 8
    mask_frame_offset: 0
    allow_backpressure_valve: true
    render_every_n_frames: 1
    refresh_hz: 30
    timing_summary_enable: true
    timing_summary_every_n: 128
    channel_filter: 0
    tensor_name: "spectrogram"
    demo_title: "Enabling RF AI for Ultra Wideband Real Time Applications"
    demo_subtitle: "Holoscan enables GPU native real time signal processing and computer vision models to detect and extract regions of interest \n \t\t\t\t\t\t from a 500 MSps stream, reducing RF AI workloads to only the regions that matter."
    blue_limit: 0.15
    red_limit: 0.88
    overlay_alpha: 0.7
    center_frequency_hz: 2400000000.0
    fft_size: 20480
    dino_chunk_rows: 256
    dino_chunk_cols: 512
    db_floor: -20.0
    db_ceil: 15.0
    row_average_n: 1
  holoviz:
    width: 1920
    height: 720
    window_title: "USRP Wideband Spectrogram"
    fullscreen: false

spectrogram:
  num_channels: 1
  enable_save: false
  enable_tensor_save: false
  save_every_n_frames: 100
  max_images_per_channel: 0
  output_height: 256
  output_width: 512
  output_dir: "/workspace/spectrograms"

coherent_power_signal_detector:
  num_channels: 1
  input_height: 250
  input_width: 512
  fast_power_floor_db: 0.5
  fast_power_span_db: 3.0
  fast_score_threshold: 0.4
  fast_strong_rescue_enable: true
  fast_strong_rescue_excess_db: 8.0
  fast_strong_rescue_min_time_bins: 3
  per_freq_threshold_offset_db: 2.0
  per_freq_threshold_path: "/workspace/holohub/applications/usrp_wideband_signal_detection/calibration/coherent_power_per_freq_floor.npy"
  # Dynamic mode learns a per-bin noise floor live and auto-resizes to the runtime FFT bin count, so
  # it works at any sample rate without a fixed-length calibration .npy (the calibrated .npy must
  # match the bin count exactly, which broke when the live FFT size changed). No calibration needed.
  per_freq_threshold_mode: "dynamic"
  dynamic_floor_init_db: 40.0
  dynamic_floor_std_k: 2.0
  dynamic_floor_warmup_frames: 0
  dynamic_floor_window_slots: 8
  dynamic_floor_slot_frames: 16
  live_emit_mask_rows: 16
  live_emit_mask_cols: 512
  live_emit_freq_persistence_window: 45
  live_emit_freq_persistence_min_hits: 11
  # emit_stride=1 snips every frame (full temporal coverage). Sustainable now that (a) the DDC/CC are
  # optimized, visualization is off, and (b) the sink writes ONE container file per pack instead of
  # one file per signal. Raise this if the GPU still falls behind, or if disk can't keep the snippet
  # BYTE rate (watch for OVERFLOW in the sink log). Keep ring_depth >= ~2*emit_stride + lag.
  emit_stride: 1
  log_detections: true
  save_performance_path_artifacts: false
  enable_mask_save: false
  save_every_n_frames: 100
  output_dir: "/workspace/coherent_power_masks"
  ignore_sideband_percent: 0.0
  ignore_sideband_hz: 7000000.0
  frontend_reference_q: 75.0
  frontend_smooth_sigma: 12.0
  frontend_max_boost_db: 0.0
  frontend_signal_cap_db: 0.0
  filter_detection_mask: true
  timing_summary_enable: true
  timing_summary_every_n: 512
  timing_summary_window: 512

# --- Signal snipper -----------------------------------------------------------------------------
# Clusters the detector mask into per-signal boxes and cuts the corresponding IQ out of the stream.
signal_snipper:
  # "time_only": keep the time regions containing any signal at full bandwidth/rate; annotate the
  #   detected freqs/bandwidths in each interval.
  # "frequency": additionally isolate each signal -- shift to 0 Hz, low-pass to its bandwidth, and
  #   (optionally) decimate to the minimum rate plus oversample margin.
  mode: "frequency"
  oversample_percent: 25.0
  enable_downsample: true
  bandwidth_margin_hz: 0.0
  # Clustering: drop connected components smaller than min_box_pixels (speckle), then coalesce
  # fragments within merge_gap_{rows,cols} mask pixels. Tuned so the dense detector mask collapses
  # to a few signal boxes instead of hundreds of slivers.
  min_box_pixels: 256
  # Pre-labeling MASK filter: zero lit runs narrower than this along each mask row (auto-scaled to
  # columns from the delivered rate: 100 kHz -> 5 cols at 24 kHz/col). Removes persistent narrowband
  # lines (receiver clock spurs, e.g. the CW spur at 2048 MHz abs) from the mask itself, so they can
  # never 4-connect with wide transients into one full-height component whose mostly-empty bounding
  # box would be stored whole (the low-SNR footprint artifact -- see snip_eval/problem.md). 0 = off.
  min_mask_bandwidth_hz: 100000.0   # match min_bandwidth_hz below
  # Post-merge physical-size gate (independent of min_box_pixels; each 0 = disabled). Drops a merged
  # box unless it is at least min_bandwidth_hz wide AND min_duration_s long. On this grid a mask
  # column = fs/cols = 24 kHz and a row = 41.67 us, so e.g. 100 kHz -> 1e5, 5 ms -> 5e-3.
  min_bandwidth_hz: 100000.0   # 100 kHz  (collaborator spec)
  min_duration_s: 0.005        # 5 ms     (collaborator spec)
  merge_gap_rows: 16
  merge_gap_cols: 80
  fir_num_taps: 129
  # Max full-rate IQ frames buffered awaiting their mask. Must exceed (a) the offline greedy
  # scheduler's ~15-20 frame source lead, AND (b) the mask spacing when strided: with
  # coherent_power_signal_detector.emit_stride=N, masks are N frames apart, so keep this >= ~2*N + lag
  # (here 2*16 = 32). Each buffered frame is ~num_bursts*burst_size complex samples (tens of MB), so
  # raising it costs device memory.
  ring_depth: 32
  # Both default to 0 = auto: the snipper reads the true rate/center from pipeline metadata
  # (rx_sample_rate_hz / rx_center_frequency_hz, stamped by the CHDR converter from the
  # channel_sample_rates_hz / channel_center_frequencies_hz above; from the SigMF core:sample_rate
  # offline). Set > 0 only to force a value when no metadata is available.
  center_frequency_hz: 0.0
  sample_rate_hz: 0.0

# --- SigMF file sink ----------------------------------------------------------------------------
sigmf_file_sink:
  # "per_signal": one SigMF recording per snippet, written as they arrive.
  # "pack": accumulate `pack_frames` frames, then flush; snippets are grouped by (rate, center) into
  #   concatenated recordings, tied by a .sigmf-collection when a pack spans multiple groups.
  mode: "per_signal"
  pack_frames: 16
  output_dir: "/workspace/spectrograms/snippets"
  filename_prefix: "snip"
  # Footprint-only eval: write just the .sigmf-meta (carries sample_count/rate => exact bytes) and
  # delete each .sigmf-data immediately, so we get REAL snipper measurements without storing IQ.
  # Set true if you actually want the snipped IQ on disk.
  write_iq: false

#
# APPLES-TO-APPLES coherent_power counterpart of config_cuda_dino_finetuned_downsample_offline.yaml.
# Everything OUTSIDE the detector block (advanced_network, chdr_converter, fft, visualization incl.
# the dynamic color limits + gain-normalized dB window, spectrogram) is byte-for-byte identical to the
# fine-tuned DINO downsample config, so both detectors run under the SAME dynamic rate/FFT scaling and
# see the SAME spectrogram. Only pipeline.detector_type + the detector block differ.
#
# Purpose: run this in the same quiet (no-signal) region as the DINO downsample config to check whether
# coherent_power also "detects" the filter passband/rolloff shape. NOTE the two detectors handle the
# rolloff differently: DINO relies on the per-frequency floor FLATTEN of its input; coherent_power here
# uses a per-frequency DYNAMIC-FLOOR detection threshold (per_freq_threshold_mode: dynamic) plus a
# fixed-Hz sideband crop (ignore_sideband_hz) -- its own input frontend flatten is off (max_boost 0).
---
num_runs: -1

pipeline:
  enable_spectrogram: true          # still needed for the waterfall visualization
  enable_detector: true
  detector_type: "coherent_power"
  log_from_spectrogram: false

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 9
    debug: false
    log_level: "info"

    memory_regions:
      - name: "Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 42
      - name: "CH1_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 64
      - name: "CH1_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 4096

    interfaces:
      - name: sdr_data
        address: 0000:a2:00.0
        rx:
          flow_isolation: true
          queues:
            - name: "Channel 1 data"
              id: 0
              cpu_core: 10
              batch_size: 1024
              memory_regions:
                - "Headers_RX_CPU"
                - "CH1_CHDR_Headers_RX_CPU"
                - "CH1_Data_RX_GPU"

          flows:
            - name: "Channel 1 data packets"
              id: 0
              action:
                type: queue
                id: 0
              match:
                udp_src: 49153
                udp_dst: 1234

chdr_converter:
  interface_name: sdr_data
  channel_center_frequencies_hz: "2400e6"
  channel_sample_rates_hz: "500e6"
  num_complex_samples_per_packet: 1024
  num_packets_per_fft: 20
  num_ffts_per_batch: 512
  num_simul_batches: 4
  num_channels: 1
  log_packets: false
  log_data: false
  partial_batch_drop_timeout_ms: 250
  degraded_reset_on_rx_queue_warning: false
  degraded_shutdown_on_rx_queue_warning_threshold: 0
  degraded_shutdown_force_exit_timeout_ms: 2000
  degraded_reset_partial_flush_threshold: 0
  degraded_reset_cooldown_ms: 1000

fft:
  burst_size: 20480
  num_bursts: 512
  num_channels: 1
  spectrum_type: 1
  averaging_type: 1
  window_time: 0
  window_type: 0
  reference_span_hz: 500000000
  reference_fft_size: 20480
  override_fft_bin_size: 0
  transform_points: 20480
  window_points: 20480
  resolution: 24414
  span: 500000000
  weighting_factor: 0
  f1_index: -10240
  f2_index: 10239
  window_time_delta: 0

logger:
  num_channels: 1
  log_interval: 5

visualization:
  enable: true
  renderer:
    num_channels: 1
    history_frames: 1
    output_height: 720
    output_width: 1920
    display_time_rows: 2048
    display_freq_bins: 20480
    history_memory_budget_mb: 1024
    rows_per_frame: 2
    mask_frame_offset: 0
    allow_backpressure_valve: true
    refresh_hz: 60
    render_every_n_frames: 1
    timing_summary_enable: false
    timing_summary_every_n: 128
    channel_filter: 0
    tensor_name: "spectrogram"
    demo_title: "Enabling RF AI for Ultra Wideband Real Time Applications"
    demo_subtitle: "Holoscan enables GPU native real time signal processing and computer vision models to detect and extract regions of interest \n \t\t\t\t\t\t from a 500 MSps stream, reducing RF AI workloads to only the regions that matter."
    blue_limit: 0.15               # fallback during warmup / when dynamic_color_limits is false
    red_limit: 0.88
    # Auto-calibrate the spectrogram color range per run: accumulate a grayscale histogram over the
    # first N frames, then freeze blue=low-pct / red=high-pct for the run (recalibrates each launch).
    dynamic_color_limits: true
    dynamic_color_warmup_frames: 60
    dynamic_color_low_pct: 0.10    # noise floor -> blue
    # Span mode: red = blue + span, so anything just above the noise floor maps bright (faint signals
    # show; strong signals saturate). Smaller span = more sensitive; raise it if noise gets speckly.
    dynamic_color_span: 0.30
    dynamic_color_high_pct: 0.995  # only used if dynamic_color_span <= 0
    overlay_alpha: 0.7
    center_frequency_hz: 2400000000.0
    fft_size: 20480
    dino_chunk_rows: 256
    dino_chunk_cols: 512
    db_floor: -20.0
    db_ceil: 15.0
    row_average_n: 1
  holoviz:
    width: 1920
    height: 720
    window_title: "USRP Wideband Spectrogram"
    fullscreen: false

spectrogram:
  num_channels: 1
  enable_save: false
  enable_tensor_save: false
  save_every_n_frames: 100
  max_images_per_channel: 0
  output_height: 256
  output_width: 512
  output_dir: "/workspace/spectrograms"

coherent_power_signal_detector:
  num_channels: 1
  input_height: 250 #256
  input_width: 512
  # Full-rate aggressive profile matching the active two-channel fast path,
  # restricted to channel 0 only.
  fast_power_floor_db: 0.5
  fast_power_span_db: 3.0
  # Primary sensitivity dial. A pixel fires when it is (power_floor_db + score*power_span_db) dB above
  # its LOCAL background: 0.4 -> 1.7 dB (~1 sigma of noise -> speckles), 0.7 -> 2.6 dB, 0.8 -> 2.9 dB.
  # Raised from the aggressive 0.4 to cut random noise speckle (code default is 0.58).
  fast_score_threshold: 0.9
  # Strong-signal rescue: let strong but frequency-narrow signals through the emit-mask width
  # filters. A pixel >= 8 dB above the per-row noise floor is OR-ed into the mask after the
  # morphology + frequency-persistence pass, provided it has more than 2 strong time bins.
  fast_strong_rescue_enable: true
  fast_strong_rescue_excess_db: 8.0
  fast_strong_rescue_min_time_bins: 3
  # Per-frequency absolute noise-floor fill (runs BEFORE the emit morphology). ORs in pixels
  # that exceed the calibrated per-row floor by offset_db, so wide signals fill in solidly
  # instead of hollowing out under the local box-mean support. Complements the strong rescue:
  # per-freq fill recovers wideband body; strong rescue recovers frequency-narrow signals.
  per_freq_threshold_offset_db: 2   # dB above the per-freq floor to fill; raised 2.0->3.5 to cut noise speckle from the fill path
  per_freq_threshold_path: "/workspace/holohub/applications/usrp_wideband_signal_detection/calibration/coherent_power_per_freq_floor.npy"
  # Per-frequency floor source: "calibrated" (load the .npy above), "dynamic" (learn a monotone
  # running-min floor live), or "static" (disable the per-frequency fill). This config uses the
  # live-learned dynamic floor (the .npy path above is ignored in this mode) -- the direct analog
  # of the DINO input flatten, but applied as a per-bin DETECTION threshold instead.
  per_freq_threshold_mode: "dynamic"
  # Dynamic-mode tuning (only used when per_freq_threshold_mode == "dynamic"):
  dynamic_floor_init_db: 40.0        # high starting bar per bin; each bin only ever descends from here
  dynamic_floor_std_k: 2.0           # per-frame per-row stat = mean + k*std of corrected_db (approx noise high-quantile)
  dynamic_floor_warmup_frames: 0     # frames to accumulate before the dynamic floor feeds the fill
  dynamic_floor_window_slots: 8      # sub-window minima kept per bin; floor = min across slots (stale lows age out)
  dynamic_floor_slot_frames: 16      # frames each slot accumulates before rotating (effective window = slots * slot_frames)
  live_emit_mask_rows: 16
  live_emit_mask_cols: 512
  live_emit_freq_persistence_window: 45
  live_emit_freq_persistence_min_hits: 18   # raised 11->18: random speckle isn't temporally persistent, so requiring more hits over the window kills it
  emit_stride: 1
  log_detections: true
  save_performance_path_artifacts: false
  enable_mask_save: false
  save_every_n_frames: 100
  output_dir: "/workspace/coherent_power_masks"
  ignore_sideband_percent: 0.0
  ignore_sideband_hz: 2000000.0
  frontend_reference_q: 75.0
  frontend_smooth_sigma: 12.0
  frontend_max_boost_db: 0.0
  frontend_signal_cap_db: 0.0
  filter_detection_mask: true
  timing_summary_enable: true
  timing_summary_every_n: 512
  timing_summary_window: 512

---
num_runs: -1

pipeline:
  enable_spectrogram: true
  enable_detector: true
  detector_type: "coherent_power"
  log_from_spectrogram: false

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 9
    debug: false
    log_level: "info"

    memory_regions:
      - name: "Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 42
      - name: "CH1_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 64
      - name: "CH1_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 4096

    interfaces:
      - name: sdr_data
        address: 0000:a2:00.0
        rx:
          flow_isolation: true
          queues:
            - name: "Channel 1 data"
              id: 0
              cpu_core: 10
              batch_size: 1024
              memory_regions:
                - "Headers_RX_CPU"
                - "CH1_CHDR_Headers_RX_CPU"
                - "CH1_Data_RX_GPU"

          flows:
            - name: "Channel 1 data packets"
              id: 0
              action:
                type: queue
                id: 0
              match:
                udp_src: 49153
                udp_dst: 1234

chdr_converter:
  interface_name: sdr_data
  num_complex_samples_per_packet: 1024
  num_packets_per_fft: 20
  num_ffts_per_batch: 512
  num_simul_batches: 4
  num_channels: 1
  log_packets: false
  log_data: false
  partial_batch_drop_timeout_ms: 250
  degraded_reset_on_rx_queue_warning: false
  degraded_shutdown_on_rx_queue_warning_threshold: 3
  degraded_shutdown_force_exit_timeout_ms: 2000
  degraded_reset_partial_flush_threshold: 3
  degraded_reset_cooldown_ms: 1000

fft:
  burst_size: 20480
  num_bursts: 512
  num_channels: 1
  spectrum_type: 1
  averaging_type: 1
  window_time: 0
  window_type: 0
  reference_span_hz: 500000000
  reference_fft_size: 20480
  override_fft_bin_size: 0
  # FFT length in bins. For this path it should stay aligned with burst_size.
  transform_points: 20480
  # Window size in bins. Keep this equal to transform_points unless you intentionally window a smaller FFT.
  window_points: 20480
  # Fallback bin width in Hz. Keep this equal to round(span / transform_points).
  resolution: 24414
  # Analyzed bandwidth in Hz. When upstream metadata does not provide sample_rate_hz,
  # this must match the radio sender rate, e.g. rx_to_remote_udp.py --rate 500e6.
  span: 500000000
  weighting_factor: 0
  f1_index: -10240
  f2_index: 10239
  window_time_delta: 0

logger:
  num_channels: 1
  log_interval: 5

visualization:
  enable: true
  renderer:
    num_channels: 1
    history_frames: 1
    output_height: 720
    output_width: 1920
    display_time_rows: 2048
    display_freq_bins: 20480
    history_memory_budget_mb: 1024
    rows_per_frame: 8
    mask_frame_offset: 0
    allow_backpressure_valve: true
    render_every_n_frames: 1
    refresh_hz: 30
    timing_summary_enable: true
    timing_summary_every_n: 128
    channel_filter: 0
    tensor_name: "spectrogram"
    demo_title: "Enabling RF AI for Ultra Wideband Real Time Applications"
    demo_subtitle: "Holoscan enables GPU native real time signal processing and computer vision models to detect and extract regions of interest \n \t\t\t\t\t\t from a 500 MSps stream, reducing RF AI workloads to only the regions that matter."
    blue_limit: 0.15               # fallback during warmup / when dynamic_color_limits is false
    red_limit: 0.88
    # Auto-calibrate the spectrogram color range per run: grayscale histogram over the first N frames,
    # then freeze blue=low-pct / red=blue+span for the run (recalibrates each launch).
    dynamic_color_limits: true
    dynamic_color_warmup_frames: 60
    dynamic_color_low_pct: 0.10    # noise floor -> blue
    dynamic_color_span: 0.30       # red = blue + span; smaller = more sensitive to faint signals
    dynamic_color_high_pct: 0.995  # only used if dynamic_color_span <= 0
    # Auto dB-floor (gated on dynamic_color_limits): db_floor tracks the detected noise floor over the
    # warmup. Offset is dB RELATIVE to the noise floor and must be NEGATIVE (floor below noise; a positive
    # offset clips noise to blue). ~-18 keeps noise dim + signals bright, auto-tracked per band.
    dynamic_db_floor_offset_db: -18.0
    dynamic_db_floor_pct: 0.05     # noise floor = this percentile across per-column dB min-holds
    overlay_alpha: 0.7 #0.38
    # Display-only center frequency readout; keep in sync with the sender --freq (2400 MHz here).
    center_frequency_hz: 2400000000.0
    fft_size: 20480
    dino_chunk_rows: 256
    dino_chunk_cols: 512
    db_floor: -20.0
    db_ceil: 15.0
    row_average_n: 1
  holoviz:
    width: 1920
    height: 720
    window_title: "USRP Wideband Spectrogram"
    fullscreen: false

spectrogram:
  num_channels: 1
  enable_save: false
  enable_tensor_save: false
  save_every_n_frames: 100
  max_images_per_channel: 0
  output_height: 256
  output_width: 512
  output_dir: "/workspace/spectrograms"

coherent_power_signal_detector:
  num_channels: 1
  input_height: 250 #256
  input_width: 512
  # Full-rate aggressive profile matching the active two-channel fast path,
  # restricted to channel 0 only.
  fast_power_floor_db: 0.5
  fast_power_span_db: 3.0
  fast_score_threshold: 0.4
  # Strong-signal rescue: let strong but frequency-narrow signals through the emit-mask width
  # filters. A pixel >= 8 dB above the per-row noise floor is OR-ed into the mask after the
  # morphology + frequency-persistence pass, provided it has more than 2 strong time bins.
  fast_strong_rescue_enable: true
  fast_strong_rescue_excess_db: 8.0
  fast_strong_rescue_min_time_bins: 3
  # Per-frequency absolute noise-floor fill (runs BEFORE the emit morphology). ORs in pixels
  # that exceed the calibrated per-row floor by offset_db, so wide signals fill in solidly
  # instead of hollowing out under the local box-mean support. Complements the strong rescue:
  # per-freq fill recovers wideband body; strong rescue recovers frequency-narrow signals.
  per_freq_threshold_offset_db: 2.0
  per_freq_threshold_path: "/workspace/holohub/applications/usrp_wideband_signal_detection/calibration/coherent_power_per_freq_floor.npy"
  # Per-frequency floor source: "calibrated" (load the .npy above), "dynamic" (learn a monotone
  # running-min floor live), or "static" (disable the per-frequency fill). Empty = legacy behavior
  # (derives from per_freq_threshold_enable). This config stays on the calibrated floor.
  per_freq_threshold_mode: "calibrated"
  # Dynamic-mode tuning (only used when per_freq_threshold_mode == "dynamic"):
  dynamic_floor_init_db: 40.0        # high starting bar per bin; each bin only ever descends from here
  dynamic_floor_std_k: 2.0           # per-frame per-row stat = mean + k*std of corrected_db (approx noise high-quantile)
  dynamic_floor_warmup_frames: 0     # frames to accumulate before the dynamic floor feeds the fill
  dynamic_floor_window_slots: 8      # sub-window minima kept per bin; floor = min across slots (stale lows age out)
  dynamic_floor_slot_frames: 16      # frames each slot accumulates before rotating (effective window = slots * slot_frames)
  live_emit_mask_rows: 16
  live_emit_mask_cols: 512
  live_emit_freq_persistence_window: 45
  live_emit_freq_persistence_min_hits: 11
  emit_stride: 1
  log_detections: true
  save_performance_path_artifacts: false
  enable_mask_save: false
  save_every_n_frames: 100
  output_dir: "/workspace/coherent_power_masks"
  ignore_sideband_percent: 0.0
  ignore_sideband_hz: 7000000.0
  frontend_reference_q: 75.0
  frontend_smooth_sigma: 12.0
  frontend_max_boost_db: 0.0
  frontend_signal_cap_db: 0.0
  filter_detection_mask: true
  timing_summary_enable: true
  timing_summary_every_n: 512
  timing_summary_window: 512


#
# OFFLINE downsample experiment: fine-tuned DINO with real_time_downsample=true (wide FFT ->
# bilinear resize freq to model width). Compare mask vs GT / native + read the per-frame inference ms.
#
# The detector taps RAW IQ (upstream of the wide analysis FFT) and runs its OWN dedicated
# nfft-point FFT to reproduce the model's trained per-pixel physics. The model input shape
# (tile_rows x nfft) and the dB clip / threshold MUST match the checkpoint's geometry contract
# (the *.meta.json emitted next to the .ts by export_dinov3_finetuned_torchscript.py).
#
# As shipped this points at the 256x1024 M2 checkpoint (bring-up / validation). To run the
# 1024x512-time target once retrained, set: tile_rows: 512, keep nfft: 1024, and point
# model_script_path at the 512x1024 .ts (its db_vmin/db_vmax/threshold from the new meta.json).
---
num_runs: -1

pipeline:
  enable_spectrogram: true          # still needed for the waterfall visualization
  enable_detector: true
  detector_type: "cuda_dino_finetuned"
  log_from_spectrogram: false

scheduler:
  worker_thread_number: 4
  stop_on_deadlock: true
  stop_on_deadlock_timeout: 500

advanced_network:
  cfg:
    version: 1
    manager: "dpdk"
    master_core: 9
    debug: false
    log_level: "info"

    memory_regions:
      - name: "Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 42
      - name: "CH1_CHDR_Headers_RX_CPU"
        kind: "huge"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 64
      - name: "CH1_Data_RX_GPU"
        kind: "device"
        affinity: 0
        access:
          - local
        num_bufs: 131072
        buf_size: 4096

    interfaces:
      - name: sdr_data
        address: 0000:a2:00.0
        rx:
          flow_isolation: true
          queues:
            - name: "Channel 1 data"
              id: 0
              cpu_core: 10
              batch_size: 1024
              memory_regions:
                - "Headers_RX_CPU"
                - "CH1_CHDR_Headers_RX_CPU"
                - "CH1_Data_RX_GPU"

          flows:
            - name: "Channel 1 data packets"
              id: 0
              action:
                type: queue
                id: 0
              match:
                udp_src: 49153
                udp_dst: 1234

chdr_converter:
  interface_name: sdr_data
  channel_center_frequencies_hz: "2400e6"
  channel_sample_rates_hz: "500e6"
  num_complex_samples_per_packet: 1024
  num_packets_per_fft: 20
  num_ffts_per_batch: 512
  num_simul_batches: 4
  num_channels: 1
  log_packets: false
  log_data: false
  partial_batch_drop_timeout_ms: 250
  degraded_reset_on_rx_queue_warning: false
  degraded_shutdown_on_rx_queue_warning_threshold: 0
  degraded_shutdown_force_exit_timeout_ms: 2000
  degraded_reset_partial_flush_threshold: 0
  degraded_reset_cooldown_ms: 1000

fft:
  burst_size: 20480
  num_bursts: 512
  num_channels: 1
  spectrum_type: 1
  averaging_type: 1
  window_time: 0
  window_type: 0
  reference_span_hz: 500000000
  reference_fft_size: 20480
  override_fft_bin_size: 0
  transform_points: 20480
  window_points: 20480
  resolution: 24414
  span: 500000000
  weighting_factor: 0
  f1_index: -10240
  f2_index: 10239
  window_time_delta: 0

logger:
  num_channels: 1
  log_interval: 5

visualization:
  enable: true
  renderer:
    num_channels: 1
    history_frames: 1
    output_height: 720
    output_width: 1920
    display_time_rows: 2048
    display_freq_bins: 20480
    history_memory_budget_mb: 1024
    rows_per_frame: 2
    mask_frame_offset: 0
    allow_backpressure_valve: true
    refresh_hz: 60
    render_every_n_frames: 1
    timing_summary_enable: false
    timing_summary_every_n: 128
    channel_filter: 0
    tensor_name: "spectrogram"
    demo_title: "Enabling RF AI for Ultra Wideband Real Time Applications"
    demo_subtitle: "Holoscan enables GPU native real time signal processing and computer vision models to detect and extract regions of interest \n \t\t\t\t\t\t from a 500 MSps stream, reducing RF AI workloads to only the regions that matter."
    blue_limit: 0.15               # fallback during warmup / when dynamic_color_limits is false
    red_limit: 0.88
    # Auto-calibrate the spectrogram color range per run: accumulate a grayscale histogram over the
    # first N frames, then freeze blue=low-pct / red=high-pct for the run (recalibrates each launch).
    dynamic_color_limits: true
    dynamic_color_warmup_frames: 60
    dynamic_color_low_pct: 0.10    # noise floor -> blue
    # Span mode: red = blue + span, so anything just above the noise floor maps bright (faint signals
    # show; strong signals saturate). Smaller span = more sensitive; raise it if noise gets speckly.
    dynamic_color_span: 0.30
    dynamic_color_high_pct: 0.995  # only used if dynamic_color_span <= 0
    overlay_alpha: 0.7
    center_frequency_hz: 2400000000.0
    fft_size: 20480
    dino_chunk_rows: 256
    dino_chunk_cols: 512
    db_floor: -20.0
    db_ceil: 15.0
    row_average_n: 1
  holoviz:
    width: 1920
    height: 720
    window_title: "USRP Wideband Spectrogram"
    fullscreen: false

spectrogram:
  num_channels: 1
  enable_save: false
  enable_tensor_save: false
  save_every_n_frames: 100
  max_images_per_channel: 0
  output_height: 256
  output_width: 512
  output_dir: "/workspace/spectrograms"

finetuned_dino_detector:
  num_channels: 1
  # ---- geometry contract: MUST match the checkpoint's exported *.meta.json ----
  tile_rows: 256                    # model input time rows (mult of 16); 512 for the retrained target
  nfft: 1024                        # model input freq bins (mult of 16) -> dedicated FFT size
  db_vmin: -46.934                  # global fixed dB->[0,1] clip from the training dataset calibration
  db_vmax: 19.557
  threshold: 0.85                   # M2_ft val-tuned decision threshold (M1_ft = 0.45)
  # ---- model + runtime ----
  model_script_path: "/workspace/holohub/dino_fine_tuning/weights/finetuned_dino_m2_bf16.ts"
  torch_dtype: "fp32"               # runtime feeds fp32; mixed precision is baked into the .ts (export --autocast bf16)
  emit_stride: 1
  channel_filter: -1
  # Real-time "downsample" mode: wide FFT then bilinear-resize the freq axis to the model width before
  # inference (bounded, rate-independent cost + a 10*log10(fft/nfft) gain correction). false = native.
  real_time_downsample: true
  downsample_fft_size: 0            # 0 = auto-size from the receive rate (=> 10240 @ 245.76 MSps); >0 pins it
